server {
    listen 80;
    server_name localhost; # Or your domain if you have one

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve static files directly with aggressive caching
    # Match common static file extensions used by Create React App build
    location ~* \.(?:css|js|map|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|json|txt)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Handle React routing (serve index.html for any other path)
    # This is crucial for SPAs like React Router based apps
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy to backend service
    location /api {
        proxy_pass http://backend:8000; # 'backend' is the service name in docker-compose.yml

        # Standard proxy headers
        proxy_set_header Host $host; # Preserves the original host
        proxy_set_header X-Real-IP $remote_addr; # Passes the real IP of the client
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # List of IPs including client and proxies
        proxy_set_header X-Forwarded-Proto $scheme; # http or https

        # WebSocket support (optional, but good to have if any real-time features are planned)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        # It's important that the backend (Django) is configured to trust these headers if needed
        # (e.g., for SECURE_PROXY_SSL_HEADER, USE_X_FORWARDED_HOST).

        # Ensure the path is forwarded correctly.
        # For example, if a request is /api/some/path, Nginx will request /api/some/path from backend:8000.
        # If the backend expects /some/path without /api, then rewrite rule or different proxy_pass is needed:
        # proxy_pass http://backend:8000/;
        # location /api/ { proxy_pass http://backend:8000/; } # Trailing slash matters
        # For now, assuming backend /api URLs are prefixed with /api as well, or Django's URL dispatcher handles it.
        # The current Django setup has /api/auth, /api/agents etc. so /api prefix should be passed.
    }
}
